version: "3.9"

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  chromadb:
    restart: always

  auth-service:
    restart: always
    deploy:
      replicas: 2

  llm-gateway:
    restart: always
    deploy:
      replicas: 2

  rag-service:
    restart: always
    deploy:
      replicas: 2

  agent-orchestrator:
    restart: always
    deploy:
      replicas: 3
